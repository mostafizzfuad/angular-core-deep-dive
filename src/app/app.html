<!-- src/app/app.html -->
<div class="courses-panel flex flex-wrap gap-4 justify-center mt-10">
  @for (
  course of courses;
  track course;
  let i = $index;
  let isFirst = $first;
  let isLast = $last;
  let isEven = $even
  ) {
  <app-course-card [course]="course" [index]="i">
  </app-course-card>
  }
</div>
